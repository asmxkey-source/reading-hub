<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독서 기록</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --ink: #1d1d1f;
    --ink-soft: #6e6e73;
    --ink-faint: #86868b;
    --line: #e3e3e6;
    --accent: #0066cc;
    --ok: #1a7f37;
    --ok-bg: #e8f5ec;
    --live: #0071e3;
    --live-bg: #e8f1fd;
    --soon: #9a6a00;
    --soon-bg: #fbf2dc;
    --radius-card: 18px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.47;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 64px 24px 96px; }

  header.hero { border-bottom: 1px solid var(--line); padding-bottom: 28px; margin-bottom: 44px; }
  header.hero h1 { margin: 0 0 8px; font-size: 36px; font-weight: 600; letter-spacing: -0.025em; }
  header.hero .sub { color: var(--ink-soft); font-size: 16px; }

  section { margin-bottom: 44px; }
  section h2 {
    font-size: 16px;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section h2 .count { color: var(--ink-soft); background: #e8e8ed; border-radius: 9999px; padding: 1px 10px; font-size: 13px; font-weight: 600; }

  .book-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-card);
    padding: 24px 26px;
    margin-bottom: 14px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.18s ease, border-color 0.18s ease;
  }
  .book-card:hover { transform: translateY(-2px); border-color: var(--ink-faint); }
  .book-card:active { transform: scale(0.99); }
  .book-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .book-title { font-size: 21px; font-weight: 600; letter-spacing: -0.02em; }
  .book-author { color: var(--ink-soft); font-size: 14px; margin-top: 4px; }
  .badge {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 9999px;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .badge.live { color: var(--live); background: var(--live-bg); }
  .badge.done { color: var(--ok); background: var(--ok-bg); }
  .badge.soon { color: var(--soon); background: var(--soon-bg); }
  .book-meta { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 8px 20px; font-size: 14px; color: var(--ink-soft); }
  .book-meta b { color: var(--ink); font-weight: 600; }
  .book-go { margin-top: 18px; font-size: 14px; color: var(--accent); font-weight: 600; letter-spacing: -0.01em; }

  .empty { text-align: center; padding: 56px 20px; color: var(--ink-soft); font-size: 15px; }
  .err { background: var(--soon-bg); color: #9a3a1a; padding: 12px 16px; border-radius: 12px; font-size: 14px; }

  .search-wrap {
    position: relative;
    margin: 0 0 36px;
  }
  .search-input {
    width: 100%;
    padding: 14px 20px 14px 46px;
    font-size: 16px;
    font-family: inherit;
    letter-spacing: -0.01em;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 9999px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.12);
  }
  .search-input::placeholder { color: var(--ink-faint); }
  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faint);
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 20px;
    color: var(--ink-faint);
    cursor: pointer;
    padding: 6px 10px;
    font-family: inherit;
    display: none;
    line-height: 1;
  }
  .search-clear:hover { color: var(--ink); }
  .search-wrap.has-query .search-clear { display: block; }

  .search-results { display: none; }
  .search-active .search-results { display: block; }
  .search-active #content { display: none; }

  .search-summary {
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 16px;
  }
  .search-summary b { color: var(--ink); font-weight: 600; }

  .result-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-card);
    padding: 18px 22px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.18s ease, border-color 0.18s ease;
  }
  .result-card:hover { transform: translateY(-1px); border-color: var(--ink-faint); }
  .result-card:active { transform: scale(0.995); }

  .result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 8px;
    align-items: center;
  }
  .result-book { color: var(--ink); font-weight: 600; }
  .result-sep { color: var(--ink-faint); }
  .result-name { color: var(--accent); font-weight: 600; }
  .result-snippet {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .result-snippet mark {
    background: #fff2a6;
    color: inherit;
    padding: 0 2px;
    border-radius: 3px;
  }
  .search-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-soft);
    font-size: 15px;
  }

  @media (max-width: 520px) {
    .wrap { padding: 40px 16px 64px; }
    header.hero h1 { font-size: 30px; }
    .book-top { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1 id="hub-title">독서 기록</h1>
    <div class="sub" id="hub-sub"></div>
  </header>

  <div class="search-wrap" id="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" class="search-input" placeholder="느낀점에서 검색... (2자 이상)" autocomplete="off">
    <button type="button" id="search-clear" class="search-clear" aria-label="지우기">×</button>
  </div>

  <div id="content"></div>
  <div class="search-results" id="search-results"></div>
</div>

<script>
function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function today() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}
function fmtRange(start, end) {
  const s = start ? start.replace(/-/g, '.').slice(2) : '?';
  const e = end ? end.replace(/-/g, '.').slice(2) : '진행 중';
  return `${s} ~ ${e}`;
}
function deriveStatus(book) {
  if (book.status && book.status !== 'auto') return book.status;
  const t = today();
  const start = parseDate(book.startDate);
  const end = parseDate(book.endDate);
  if (start && t < start) return 'soon';
  if (end && t > end) return 'done';
  return 'live';
}
const STATUS_META = {
  live: { label: '진행 중', cls: 'live', group: '🟢 진행 중', order: 0 },
  soon: { label: '예정', cls: 'soon', group: '🗓 예정', order: 1 },
  done: { label: '완독', cls: 'done', group: '✅ 완독', order: 2 },
};

function bookCard(book) {
  const st = deriveStatus(book);
  const meta = STATUS_META[st];
  const members = (book.members || []).join(', ');
  return `
    <a class="book-card" href="./${encodeURIComponent(book.slug)}/">
      <div class="book-top">
        <div>
          <div class="book-title">${escapeHtml(book.title)}</div>
          <div class="book-author">${escapeHtml(book.author || '')}</div>
        </div>
        <span class="badge ${meta.cls}">${meta.label}</span>
      </div>
      <div class="book-meta">
        <span>📅 ${fmtRange(book.startDate, book.endDate)}</span>
        ${book.totalSessions ? `<span>📖 ${book.totalSessions}회차</span>` : ''}
        ${members ? `<span>👥 ${escapeHtml(members)}</span>` : ''}
      </div>
      <div class="book-go">대시보드 열기 →</div>
    </a>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}

function render(data) {
  document.getElementById('hub-title').textContent = data.hubTitle || '독서 기록';
  const books = data.books || [];
  const total = books.length;
  const done = books.filter(b => deriveStatus(b) === 'done').length;
  document.getElementById('hub-sub').textContent = `총 ${total}권 · 완독 ${done}권`;

  if (total === 0) {
    document.getElementById('content').innerHTML = '<div class="empty">아직 등록된 책이 없어요.<br>books.json에 첫 책을 추가하세요.</div>';
    return;
  }

  const groups = {};
  books.forEach(b => {
    const st = deriveStatus(b);
    (groups[st] = groups[st] || []).push(b);
  });

  const order = Object.keys(groups).sort((a, b) => STATUS_META[a].order - STATUS_META[b].order);
  document.getElementById('content').innerHTML = order.map(st => {
    const list = groups[st];
    return `
      <section>
        <h2>${STATUS_META[st].group} <span class="count">${list.length}</span></h2>
        ${list.map(bookCard).join('')}
      </section>`;
  }).join('');
}

function parseChatFor(text, members) {
  const entries = [];
  const namePattern = members.join('|');
  const re = new RegExp(`(\\d{1,2})[\\/.](\\d{1,2})\\s+(${namePattern})\\s*_\\s*(\\d+)\\s*회\\s*차\\s*미\\s*션\\s*완\\s*료[^\\n]*`, 'g');
  const stopRe = /\n(?:\[[^\]\n]+\]\s*\[(?:오전|오후)\s*\d|-{5,}\s*\d{4}년)/;
  let m;
  const seen = new Set();
  while ((m = re.exec(text)) !== null) {
    const month = +m[1], day = +m[2], name = m[3], session = +m[4];
    const key = `${name}|${session}`;
    if (seen.has(key)) continue;
    seen.add(key);
    const matchEnd = m.index + m[0].length;
    const rest = text.substring(matchEnd);
    const stop = rest.match(stopRe);
    const contentEnd = stop ? stop.index : rest.length;
    const content = rest.substring(0, contentEnd)
      .replace(/^-{5,}\s*\d{4}년\s*\d{1,2}월\s*\d{1,2}일.*$/gm, '')
      .trim();
    entries.push({ name, session, month, day, content });
  }
  return entries;
}

let ALL_ENTRIES = [];

async function loadAllEntries(books) {
  const results = await Promise.all(books.map(async (book) => {
    try {
      const r = await fetch(`./${encodeURIComponent(book.slug)}/chat.txt?_=${Date.now()}`);
      if (!r.ok) return [];
      const text = await r.text();
      const members = book.members || [];
      if (members.length === 0) return [];
      const parsed = parseChatFor(text, members);
      return parsed.map(e => ({
        bookSlug: book.slug,
        bookTitle: book.title,
        name: e.name,
        session: e.session,
        month: e.month,
        day: e.day,
        content: e.content,
      }));
    } catch { return []; }
  }));
  return results.flat();
}

function makeSnippet(content, query, radius = 40) {
  const lc = content.toLowerCase();
  const q = query.toLowerCase();
  const idx = lc.indexOf(q);
  if (idx === -1) return escapeHtml(content.slice(0, 80)) + (content.length > 80 ? '…' : '');
  const start = Math.max(0, idx - radius);
  const end = Math.min(content.length, idx + query.length + radius);
  const before = start > 0 ? '…' : '';
  const after = end < content.length ? '…' : '';
  const raw = content.slice(start, end);
  const highlighted = escapeHtml(raw).replace(
    new RegExp(escapeRegex(query), 'gi'),
    m => `<mark>${m}</mark>`
  );
  return `${before}${highlighted}${after}`.replace(/\n+/g, ' ');
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function runSearch(query) {
  const wrap = document.getElementById('search-wrap');
  const resultsEl = document.getElementById('search-results');
  const q = query.trim();
  wrap.classList.toggle('has-query', q.length > 0);
  if (q.length < 2) {
    document.body.classList.remove('search-active');
    resultsEl.innerHTML = '';
    return;
  }
  document.body.classList.add('search-active');
  const qLc = q.toLowerCase();
  const hits = ALL_ENTRIES.filter(e => e.content.toLowerCase().includes(qLc));
  if (hits.length === 0) {
    resultsEl.innerHTML = `<div class="search-summary"><b>${escapeHtml(q)}</b> 검색 결과 없음</div>`;
    return;
  }
  const summary = `<div class="search-summary"><b>${escapeHtml(q)}</b> — 결과 ${hits.length}건</div>`;
  const items = hits.map(e => `
    <a class="result-card" href="./${encodeURIComponent(e.bookSlug)}/">
      <div class="result-meta">
        <span class="result-book">📖 ${escapeHtml(e.bookTitle)}</span>
        <span class="result-sep">·</span>
        <span>${e.session}회차</span>
        <span class="result-sep">·</span>
        <span class="result-name">${escapeHtml(e.name)}</span>
        <span class="result-sep">·</span>
        <span>${e.month}/${e.day}</span>
      </div>
      <div class="result-snippet">${makeSnippet(e.content, q)}</div>
    </a>
  `).join('');
  resultsEl.innerHTML = summary + items;
}

function initSearch() {
  const input = document.getElementById('search-input');
  const clear = document.getElementById('search-clear');
  input.addEventListener('input', (e) => runSearch(e.target.value));
  clear.addEventListener('click', () => {
    input.value = '';
    input.focus();
    runSearch('');
  });
}

fetch('books.json?_=' + Date.now())
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(async (data) => {
    render(data);
    initSearch();
    ALL_ENTRIES = await loadAllEntries(data.books || []);
  })
  .catch(() => {
    document.getElementById('content').innerHTML = '<div class="err">books.json을 불러오지 못했어요. 파일이 같은 폴더에 있는지 확인하세요.</div>';
  });
</script>
</body>
</html>
